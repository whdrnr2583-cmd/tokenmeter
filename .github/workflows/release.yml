name: release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
      - run: npm ci
      # Idempotent guard: skip publish if this version is already on npm.
      # Lets first-publish be done manually (RELEASE_RUNBOOK.md step T-0)
      # without colliding when the v* tag is pushed afterwards.
      - name: Check if version already published
        id: check
        shell: bash
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version 2>/dev/null | grep -q "."; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Version $NAME@$VERSION already on npm — skipping publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build
        if: steps.check.outputs.already_published == 'false'
        run: npm run build
      - name: Publish
        if: steps.check.outputs.already_published == 'false'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    runs-on: ubuntu-latest
    needs: publish-npm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
